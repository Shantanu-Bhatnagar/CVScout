methodology_summary: |
  "Deterministic-probabilistic hybrid ranking engine designed to handle 100,000-candidate JSONL streams 
  under zero-network, 5-minute compute restrictions. The pipeline processes raw records through a hardcoded 
  anomaly detection layer, instantly pruning inconsistent timeline honeypots and keyword-stuffed profiles 
  lacking technical domain alignment. Cleaned candidates are transformed into numeric feature matrices 
  representing experience proximity, location matching, and a composite availability weight calculated 
  from recruiter response metrics and June 2026 inactivity steps. A specialized LightGBM model outputs 
  ordered scores with deterministic ID sorting to completely avoid rank collisions. The final 101-line CSV 
  integrates context-specific, pre-computed reasoning vectors mapped via local key-value lookups.""

